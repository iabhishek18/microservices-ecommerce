syntax = "proto3";

package ecommerce;

option go_package = "github.com/iabhishek18/microservices-ecommerce/proto";

service OrderService {
  rpc CreateOrder (CreateOrderRequest) returns (Order);
  rpc GetOrder (GetOrderRequest) returns (Order);
  rpc UpdateOrderStatus (UpdateStatusRequest) returns (Order);
  rpc ListUserOrders (ListUserOrdersRequest) returns (OrderList);
}

message OrderItem { string product_id = 1; int32 quantity = 2; double unit_price = 3; }
message Order {
  string id = 1;
  string user_id = 2;
  repeated OrderItem items = 3;
  double total_amount = 4;
  string status = 5;
  string payment_id = 6;
  string created_at = 7;
}

message CreateOrderRequest { string user_id = 1; repeated OrderItem items = 2; string payment_method = 3; }
message GetOrderRequest { string id = 1; }
message UpdateStatusRequest { string id = 1; string status = 2; }
message ListUserOrdersRequest { string user_id = 1; int32 page = 2; int32 limit = 3; }
message OrderList { repeated Order orders = 1; int32 total = 2; }
